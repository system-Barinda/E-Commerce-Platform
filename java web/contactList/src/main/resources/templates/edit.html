<h1>Modify Contact | <a th:href="@{/list}"> Registered Contacts </a></h1> <hr>

<form method="post" th:action="@{/update}" th:object="${contact}">
   
   <input type="hidden" th:field="*{id}">
  <label>Name</label>
  <input type="text" th:field="*{name}"><br><br>
  <label>Phone</label>
  <input type="text" th:field="*{phone}"><br><br>
  <input type="submit" value="Save Changes">
</form>
